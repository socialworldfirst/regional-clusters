<script>
var KEY = "wf_regions_pw";
function b2b(b64){var s=atob(b64),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function dkey(pw,salt,it){var e=new TextEncoder();var bk=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function dec(pw){var b=JSON.parse(document.getElementById('payload').textContent);
  var k=await dkey(pw,b2b(b.salt),b.iterations);
  var p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(b.iv)},k,b2b(b.ciphertext));
  return new TextDecoder().decode(p);}
async function reveal(pw){var html=await dec(pw);try{localStorage.setItem(KEY,pw);}catch(_){}document.open();document.write(html);document.close();}
async function go(e){e.preventDefault();var i=document.getElementById('pw'),er=document.getElementById('err');er.textContent='';
  try{await reveal(i.value);}catch(x){er.textContent='wrong password';i.value='';i.focus();}return false;}
(async function(){try{var c=localStorage.getItem(KEY);if(c)await reveal(c);}catch(_){try{localStorage.removeItem(KEY);}catch(__){}}})();
</script>
